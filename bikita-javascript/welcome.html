  <body>
    <h1>march 6 JavaScript</h1>
    <h1>biki</h1>
    <h1>Move your mouse!</h1>
    <p id="coords"></p>
    <script>
      //one letter display type 
      let text = "Bikita suwal"
      let i=0;
      function type(){
        if(i<text.length){
          document.body.innerHTML+=text.charAt(i);
          i++;
          setTimeout(type,500);
        }
      }
      type();
      
      // mouse loc
      document.addEventListener("mousemove", function (event) {
        let x = event.clientX;
        let y = event.clientY;

        document.getElementById("coords").innerText =
          "Mouse X: " + x + " Mouse Y: " + y;
      });
