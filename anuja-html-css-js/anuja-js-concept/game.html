<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Move my mouse</h1>
    <p id="coords"></p>
    <script>
        document.addEventListener("mousemove", function (event) {

            let x = event.clientX;
            let y = event.clientY;


            document.getElementById("coords").innerText = "Mouse X:" + x + "Mouse Y:" + y;
        });

        let text = "Welcome to JavaScript Magic!";
        let i = 0;

        function type() {

            if (i < text.length) {
                document.body.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            }

        }
    </script>
</body>

</html>
