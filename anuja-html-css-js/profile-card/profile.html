<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="profile.css">

</head>

<body>
    <div class="card">
        <img src="avatar.jpg" width="100px" height="100px" alt="profile">
        <h2>Anuja Khatri</h2>
        <p> Sofftware developer </p>
        <button id="followBtn" class="btn-blue">Follow</button>
    </div>
</body>
<script>
    const followBtn = document.getElementById('followBtn');
    followBtn.addEventListener('click', () => {
        if (followBtn.textContent === 'Follow') {
            followBtn.textContent = 'Unfollow';
            // Remove previous color classes and add the red one
            followBtn.classList.remove('btn-blue', 'btn-green');
            followBtn.classList.add('btn-red');
        } else {
            followBtn.textContent = 'Follow';
            // Remove previous color classes and add the green one
            followBtn.classList.remove('btn-blue', 'btn-red');
            followBtn.classList.add('btn-green');
        }
    });  
</script>

</html>
