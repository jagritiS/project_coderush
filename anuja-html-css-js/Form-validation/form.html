<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        * {
            font-family: 'Arial, sans-sarif, Helvetica';
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
            margin: 15px;
        }

        input {
            height: 20px;
        }

        button {
            color: white;
            background-color: rgb(0, 0, 180);
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            transition:
                background-color 0.3s ease;
        }

        button:hover {
            background-color: rgb(0, 0, 255);
        }
    </style>
</head>

<body>
    <form id="form">
        <label for="email">Enter Your Email</label>
        <input type="email" id="email" placeholder="Enter your email" required
            title="Please enter a valid email address">

        <label for="password">Enter Your Password</label>
        <input type="password" id="password" placeholder="Enter your password" required minlength="6"
            title="Password must be at least 6 characters long">

        <label for="location">Enter Your Location</label>
        <input type="text" name="location" id="location" placeholder="Enter your location" required>
        <button type="submit">Submit</button>
        <p id="error"></p>

    </form>
    <script>
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const locationInput = document.getElementById("location");
        const error = document.getElementById("error");

        // Prevent moving to password if email is invalid
        passwordInput.addEventListener("focus", () => {
            if (!emailInput.checkValidity()) {
                emailInput.reportValidity();
            }
        });

        locationInput.addEventListener("focus", () => {
            if (!passwordInput.checkValidity()) {
                passwordInput.reportValidity();
            }
        });



        document.getElementById("form").onsubmit = (e) => {
            e.preventDefault();
            if (!emailInput.checkValidity()) {
                emailInput.reportValidity();
            }
            else if (!passwordInput.checkValidity()) {
                passwordInput.reportValidity();
            }
            else {
                error.textContent = "Success";
            }
        }
    </script>
</body>

</html>
