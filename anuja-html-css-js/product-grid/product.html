<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>
</head>
<style>
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
    }

    .card {
        background-color: #f0f0f0;
        padding: 20px;
        text-align: center;
        border-radius: 5px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
</style>

<body>
    <div class="grid">
        <div class="card">Product 1</div>
        <div class="card">Product 2</div>
        <div class="card">Product 3</div>
        <div class="card">Product 4</div>
        <div class="card">Product 5</div>
        <div class="card">Product 6</div>
        <div class="card">Product 7</div>
        <div class="card">Product 8</div>
        <div class="card">Product 9</div>
        <div class="card">Product 10</div>
    </div>
</body>

</html>
