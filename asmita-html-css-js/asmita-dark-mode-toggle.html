<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup</title>
    </head>
<style>
    body{
        background: #fff;
        color:#000;
        transition:0.3s;
    }
    body.dark-mode{
        background: #000;
        color:#fff;
    }
</style>

<body>
    <button onclick="toggleMode()">Toggle Dark Mode</button>
</body>
<script>
    function toggleMode(){
        document.body.classList.toggle("dark-mode");
    }
</script>
</html>
