<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-weight: bold;
      font-family: sans-serif;
      text-align: center;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 200px 2fr;
      min-height: 100vh
    }

    aside {
      background: teal;
      color: #fff;
      padding: 20px
    }

    .cards {
      display: flex;
      gap: 20px;
      padding: 20px
    }

    .card {
      flex: 1;
      background: #fff;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .1)
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <aside>Sidebar</aside>
    <main>
      <div class="cards">
        <div class="card">Users</div>
        <div class="card">Sales</div>
        <div class="card">Orders</div>
      </div>
    </main>
  </div>

</body>

</html>
