<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      cursor: pointer;
    }

    .modal .content {
      background: #fff;
      margin: 50% auto;
      padding: 20px;
      width: 300px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <button onclick="clickModal()">Open</button>
  <div id="modal" class="modal">
    <div id="content">Hello <span onclick="closeModal()">❌</span></div>
  </div>


  <script>
    function clickModal() {
      modal.style.display = 'block';
    }
    function closeModal() {
      modal.style.display = 'none';

    }
  </script>

</body>


</html>
