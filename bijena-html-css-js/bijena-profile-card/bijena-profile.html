 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        .card {
            width: 200px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card h2 {
            margin: 10px 0 5px;
        }

        .card p {
            color: #777;
            margin: 5px 0;
        }

        #followBtn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #followBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="../src/bijenadwj.jpg" alt="">
        <h2>Bijena Dhewaju</h2>
        <p>Frontend Developer</p>
        <button id="followBtn">Follow</button>
    </div>
</body>

<script>
    const followBtn = document.getElementById('followBtn');
    followBtn.addEventListener('click',()=>{
        if(followBtn.textContent === 'Follow'){
            followBtn.textContent = 'Unfollow';
            followBtn.style.backgroundColor = '#dc3545';
        }else{
            followBtn.textContent = 'Follow';
            followBtn.style.backgroundColor = '#007bff';
        }
    });
</script>
</html>
