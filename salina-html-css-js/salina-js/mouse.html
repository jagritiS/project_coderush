<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Move your mouse!</h1>
    <p id="coords"></p>


    <!-- mouse game -->
    <script>
        document.addEventListener("mousemove", function(event) {

         let x = event.clientX;
         let y = event.clientY;

         document.getElementById("coords").innerText =
         "Mouse X: " + x + " Mouse Y: " + y;

    });
    
        setInterval(() => {
            document.body.style.marginLeft = Math.random() * 20 + "px";
        }, 100);

    </script>
</body>
</html>
