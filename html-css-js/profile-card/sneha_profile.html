<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    code for css
</head>
<style>
        .card {
            width: 200px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .card img {
            border-radius: 50%;
        }
        .card h2 {
            margin: 10px 0 5px;
        }
        .card p {
            color: #777;
            margin: 0 0 15px;
        }
        #followBtn {
            padding: 10px 20px;
            background-color: #fdfeff;
            color: rgb(230, 194, 236);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #followBtn:hover {
            background-color: #aaccf1;
        }
        </style>
        
</head>
<body>
     <div class="card">
  <img src="aus pic.jpg & size=64" alt="profile">
  <h2>Sneha Shrestha</h2>
  <p>Full Stack AI Engineer </p>
  <button id="followBtn">Follow</button>
  </div>
</body>
<script>
    const followBtn = document.getElementById('followBtn');
    followBtn.addEventListener('click', () => {
        if (followBtn.textContent === 'Follow') {
            followBtn.textContent = 'Followed';
            followBtn.style.backgroundColor = '#dc3545';
        } else {
            followBtn.textContent = 'Not Follow';
            followBtn.style.backgroundColor = '#007BFF';
        }
    });  
    </script>
</html>
