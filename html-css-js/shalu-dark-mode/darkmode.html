<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:#fff;
            color:#000;
            transition:.3s;
        }
    
        .dark{
            background:#111;
            color:#fff;
        }
    </style>
</head>

<body>
    <button onclick="toggleMode()">Toggle Theme</button>

<script>
    function toggleMode(){
        document.body.classList.toggle("dark");
    }
</script>

</body>
</html>
